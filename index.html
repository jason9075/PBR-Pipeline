<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PBR Pipeline Visualizer</title>
  <link rel="stylesheet" href="/src/style.css" />
  <script type="module" src="/src/main.js"></script>
</head>
<body>

  <header id="header">
    <span id="app-title">PBR Pipeline Visualizer</span>
    <div id="header-right">
      <div id="shader-modes" role="group" aria-label="Shader mode">
        <button class="mode-btn" data-mode="wireframe" type="button">Wireframe</button>
        <button class="mode-btn active" data-mode="render" type="button">Render</button>
        <button class="mode-btn" data-mode="mix" type="button">Mix</button>
      </div>
      <button id="open-math" class="icon-button" type="button"
        aria-haspopup="dialog" aria-controls="math-modal" aria-label="Explain the math">💡</button>
    </div>
  </header>

  <main id="workspace">

    <aside id="left-panel">

      <!-- 1. Scene Controls -->
      <section class="panel-section">
        <h3 class="section-title">Scene</h3>
        <label class="ctrl-label" for="azimuth">Light Direction</label>
        <div class="slider-row">
          <span>←</span>
          <input type="range" id="azimuth" min="0" max="360" value="45" />
          <span>→</span>
        </div>
        <label class="ctrl-label" for="intensity">Light Intensity</label>
        <div class="slider-row">
          <span>○</span>
          <input type="range" id="intensity" min="0" max="5" step="0.1" value="2" />
          <span>●</span>
        </div>
        <label class="ctrl-label">Environment</label>
        <div class="btn-group" id="env-group" role="group" aria-label="Environment">
          <button class="env-btn" data-env="none" type="button">None</button>
          <button class="env-btn active" data-env="studio" type="button">Studio</button>
          <button class="env-btn" data-env="outdoor" type="button">Outdoor</button>
        </div>
        <label class="ctrl-label" for="disp-scale">
          Displacement Scale <span id="disp-scale-val">0.08</span>
        </label>
        <div class="slider-row">
          <span>○</span>
          <input type="range" id="disp-scale" min="0" max="0.3" step="0.01" value="0.08" />
          <span>●</span>
        </div>
      </section>

      <!-- 2. Material Selection -->
      <section class="panel-section">
        <h3 class="section-title">Materials</h3>
        <div id="material-list" role="listbox" aria-label="Material selection">
          <div class="mat-item active" data-mat="brick" role="option" aria-selected="true" tabindex="0">
            <span class="radio-dot"></span> Brick Wall
          </div>
          <div class="mat-item" data-mat="metal" role="option" aria-selected="false" tabindex="-1">
            <span class="radio-dot"></span> Metal Plate
          </div>
          <div class="mat-item" data-mat="rock" role="option" aria-selected="false" tabindex="-1">
            <span class="radio-dot"></span> Rock Surface
          </div>
        </div>
      </section>

      <!-- 3. Texture Channels -->
      <section class="panel-section">
        <h3 class="section-title">Channels</h3>
        <div id="channel-list">
          <div class="channel-row" data-channel="albedo">
            <input type="checkbox" id="ch-albedo" checked />
            <label for="ch-albedo">Albedo</label>
            <button class="isolate-btn" data-channel="albedo" title="Isolate" type="button"></button>
          </div>
          <div class="channel-row" data-channel="normal">
            <input type="checkbox" id="ch-normal" checked />
            <label for="ch-normal">Normal Map</label>
            <button class="isolate-btn" data-channel="normal" title="Isolate" type="button"></button>
          </div>
          <div class="channel-row" data-channel="roughness">
            <input type="checkbox" id="ch-roughness" checked />
            <label for="ch-roughness">Roughness</label>
            <button class="isolate-btn" data-channel="roughness" title="Isolate" type="button"></button>
          </div>
          <div class="channel-row" data-channel="metalness">
            <input type="checkbox" id="ch-metalness" />
            <label for="ch-metalness">Metalness</label>
            <button class="isolate-btn" data-channel="metalness" title="Isolate" type="button"></button>
          </div>
          <div class="channel-row" data-channel="ao">
            <input type="checkbox" id="ch-ao" checked />
            <label for="ch-ao">Ambient Occlusion</label>
            <button class="isolate-btn" data-channel="ao" title="Isolate" type="button"></button>
          </div>
          <div class="channel-row" data-channel="displacement">
            <input type="checkbox" id="ch-displacement" checked />
            <label for="ch-displacement">Displacement</label>
            <button class="isolate-btn" data-channel="displacement" title="Isolate" type="button"></button>
          </div>
        </div>
      </section>

      <!-- 4. Texture Preview Strip -->
      <section class="panel-section">
        <h3 class="section-title">Preview</h3>
        <div id="texture-preview">
          <div class="tex-thumb" data-channel="albedo" title="Albedo">
            <img alt="Albedo" />
            <span>ALB</span>
          </div>
          <div class="tex-thumb" data-channel="normal" title="Normal Map">
            <img alt="Normal" />
            <span>NRM</span>
          </div>
          <div class="tex-thumb" data-channel="roughness" title="Roughness">
            <img alt="Roughness" />
            <span>RGH</span>
          </div>
          <div class="tex-thumb" data-channel="ao" title="Ambient Occlusion">
            <img alt="AO" />
            <span>AO</span>
          </div>
          <div class="tex-thumb" data-channel="metalness" title="Metalness">
            <img alt="Metalness" />
            <span>MET</span>
          </div>
          <div class="tex-thumb" data-channel="displacement" title="Displacement">
            <img alt="Displacement" />
            <span>DISP</span>
          </div>
        </div>
      </section>

    </aside>

    <div id="viewport">
      <canvas id="canvas"></canvas>
      <div id="stats-overlay">
        <div id="stat-fps">FPS: —</div>
        <div id="stat-draws">Draw calls: —</div>
        <div id="stat-tris">Triangles: —</div>
      </div>
    </div>

  </main>

  <!-- Math Modal -->
  <div id="math-modal" role="dialog" aria-modal="true" aria-labelledby="math-title" hidden>
    <div class="modal-panel">
      <div class="modal-header">
        <h2 id="math-title">Math Behind PBR</h2>
        <div class="modal-actions">
          <button id="language-toggle" class="modal-toggle" type="button">Eng/中</button>
          <button id="close-math" class="modal-toggle" type="button" aria-label="Close">Close</button>
        </div>
      </div>
      <div id="math-content" class="modal-body"></div>
    </div>
  </div>

</body>
</html>
